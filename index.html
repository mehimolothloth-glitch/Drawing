<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div>
  <div class="art-studio">
    <div class="canvas-container">
      <canvas id="drawCanvas" width="900" height="550" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/550;"></canvas>
    </div>
    <div class="toolbar">
      <button class="tool-btn" id="penBtn" title="Pena (gambar bebas)">Pena</button>
      <button class="tool-btn" id="eraserBtn" title="Penghapus">Hapus</button>
      <div class="color-preview" id="colorPreview" style="background:#000000;"></div>
      <input type="color" id="colorPicker" value="#000000">
      <div class="slider-container">
        <span>Ukuran</span>
        <input type="range" id="sizeSlider" min="2" max="40" value="5">
        <span id="sizeValue">5px</span>
      </div>
      <button class="tool-btn" id="clearBtn">Sammpaah</button>
      <button class="tool-btn" id="saveBtn">Save Me</button>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 0 10px;">
      <div class="badge">Wes Sak Karep</div>
      <div class="badge">Sak Karepmu Lapo Ae</div>
    </div>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
